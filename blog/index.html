<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Redirecting to Blog...</title>
    <script>
      // GitHub Pages does not handle SPA routes like /blog, so we redirect to the hash route.
      window.location.replace('../index.html#/blog')
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=../index.html#/blog" />
    </noscript>
  </head>
  <body></body>
</html>
